<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NavBus — Alerts</title>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/reset.css"/>
  <link rel="stylesheet" href="css/admin.layout.css"/>
  <style>
    .alert-item { display:flex;gap:14px;align-items:flex-start;padding:16px 20px;border-bottom:1px solid var(--border);transition:background 0.15s; }
    .alert-item:hover { background:var(--bg-tertiary); }
    .alert-item:last-child { border-bottom:none; }
    .alert-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px; }
    .alert-dot.critical { background:#f87171; }
    .alert-dot.warning  { background:#fbbf24; }
    .alert-dot.info     { background:#60a5fa; }
    .alert-dot.success  { background:#4ade80; }
    .alert-body { flex:1; }
    .alert-title { font-size:0.85rem;font-weight:600;color:var(--text-primary);margin-bottom:3px; }
    .alert-meta  { font-size:0.72rem;color:var(--text-muted); }
    .alert-time  { font-size:0.7rem;color:var(--text-muted);white-space:nowrap; }
    .severity-badge { padding:2px 8px;border-radius:12px;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em; }
    .sev-critical { background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.2); }
    .sev-warning  { background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.2); }
    .sev-info     { background:rgba(96,165,250,0.12);color:#60a5fa;border:1px solid rgba(96,165,250,0.2); }
    .sev-success  { background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.2); }
    .alerts-card  { background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;overflow:hidden; }
    .unread-indicator { width:7px;height:7px;border-radius:50%;background:#f87171;display:inline-block;margin-left:6px;vertical-align:middle; }
  </style>
</head>
<body>
<div class="admin-shell">

  <aside class="admin-sidebar" id="adminSidebar">
    <a href="dashboard.html" class="sidebar-logo">
            <img src="../../assets/logo.png" alt="NavBus" class="sidebar-logo-img"/>
    </a>
    <nav class="sidebar-nav">
      <span class="sidebar-section-label">Main</span>
      <a href="dashboard.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="buses.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Fleet / Buses</a>
      <a href="routes.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>Routes</a>
      <a href="drivers.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Drivers</a>
      <span class="sidebar-section-label">Monitoring</span>
      <a href="alerts.html" class="sidebar-link active"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Alerts<span class="sidebar-badge" id="sidebarAlertCount">3</span></a>
      <a href="reports.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Reports</a>
      <span class="sidebar-section-label">System</span>
      <a href="users.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>
      <a href="settings.html" class="sidebar-link"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-status-bar"><div class="sidebar-live-dot"></div><span class="sidebar-live-label">All Systems Online</span></div>
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">AD</div>
        <div class="sidebar-user-info"><span class="sidebar-user-name" id="sidebarUserName">Administrator</span><span class="sidebar-user-role">Admin</span></div>
        <button class="sidebar-logout-btn" id="logoutBtn" title="Sign out"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="admin-body">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-menu-btn" id="headerMenuBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="header-breadcrumb">
          <a href="dashboard.html" class="breadcrumb-item">Dashboard</a>
          <span class="breadcrumb-separator">›</span>
          <span class="breadcrumb-item current">Alerts</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-time"><div style="width:6px;height:6px;border-radius:50%;background:var(--success);animation:livePulse 1.8s infinite;flex-shrink:0;"></div><span id="headerClock">00:00:00</span></div>
      </div>
    </header>

    <main class="admin-main">
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title"><span class="page-title-accent"></span>Alerts<span class="unread-indicator"></span></h1>
          <p class="page-subtitle">System alerts, fleet warnings, and critical notifications</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-outline btn-md" id="btnMarkAllRead">Mark All Read</button>
          <button class="btn btn-outline btn-md" id="btnRefresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.02-9.5"/></svg>
            Refresh
          </button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon danger">🔴</div><div class="stat-info"><div class="stat-value" id="statCritical">1</div><div class="stat-label">Critical</div></div></div>
        <div class="stat-card"><div class="stat-icon warning">🟡</div><div class="stat-info"><div class="stat-value" id="statWarning">2</div><div class="stat-label">Warnings</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">🔵</div><div class="stat-info"><div class="stat-value" id="statInfo">3</div><div class="stat-label">Info</div></div></div>
        <div class="stat-card"><div class="stat-icon success">✅</div><div class="stat-info"><div class="stat-value" id="statResolved">5</div><div class="stat-label">Resolved Today</div></div></div>
      </div>

      <div class="table-toolbar">
        <div class="toolbar-left">
          <select id="severityFilter" class="filter-select">
            <option value="all">All Severity</option>
            <option value="critical">Critical</option>
            <option value="warning">Warning</option>
            <option value="info">Info</option>
            <option value="success">Resolved</option>
          </select>
          <span class="results-count" id="alertCount">6 alerts</span>
        </div>
      </div>

      <div class="alerts-card" id="alertsList">
        <!-- rendered by JS -->
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="js/admin.auth.guard.js"></script>
<script src="js/admin.layout.js"></script>
<script src="js/admin.alerts.js"></script>
</body>
</html>

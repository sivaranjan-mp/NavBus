<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>NavBus — Reset Password</title>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/reset.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="auth-page">

  <div class="auth-orb-bottom"></div>

  <div class="auth-card">
    <div class="auth-card-inner">

      <!-- Logo -->
      <a href="../../index.html" class="auth-logo">
                <img src="../../assets/logo.png" alt="NavBus" class="auth-logo-img"/>
      </a>

      <!-- Step Indicator -->
      <div class="step-indicator">
        <div class="step-dot done">
          <div class="step-dot-circle"></div>
          <span class="step-dot-label">Request</span>
        </div>
        <div class="step-dot active" id="otpStepDot">
          <div class="step-dot-circle">2</div>
          <span class="step-dot-label">Verify</span>
        </div>
        <div class="step-dot" id="pwdStepDot">
          <div class="step-dot-circle">3</div>
          <span class="step-dot-label">New Pass</span>
        </div>
      </div>

      <!-- ═══ STEP 2: Enter OTP ═══ -->
      <div id="stepVerifyOTP">
        <div class="auth-header">
          <h1 class="auth-title">Enter Code</h1>
          <p class="auth-subtitle">
            Enter the 6-digit code sent to<br/>
            <strong id="resetEmailDisplay" style="color:var(--gold);">your email</strong>
          </p>
        </div>

        <div class="otp-container" id="resetOTPContainer">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        </div>

        <div id="resetOtpError" style="display:none; margin-bottom:var(--space-4);">
          <div class="auth-info-box error">
            <span class="auth-info-box-icon">✕</span>
            <span id="resetOtpErrorText">Invalid or expired code.</span>
          </div>
        </div>

        <button class="btn btn-gold" id="verifyResetBtn" data-loading-text="Verifying...">
          Verify Code
        </button>

        <div class="otp-resend" style="margin-top:var(--space-4);">
          <a href="forgot-password.html" style="color:var(--text-muted);font-size:0.8rem;">
            ← Request a new code
          </a>
        </div>
      </div>

      <!-- ═══ STEP 3: New Password ═══ -->
      <div id="stepNewPwd" style="display:none">
        <div class="auth-header">
          <h1 class="auth-title">New Password</h1>
          <p class="auth-subtitle">Create a strong, new password for your account.</p>
        </div>

        <form class="auth-form" id="newPwdForm" novalidate>

          <div class="form-group">
            <label class="form-label" for="newPwd">New Password</label>
            <div class="form-input-wrap">
              <input type="password" id="newPwd" class="form-input has-icon"
                placeholder="Min. 8 characters"
                autocomplete="new-password" required/>
              <button type="button" class="input-icon" id="toggleNewPwd" aria-label="Toggle">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="password-strength-wrap" id="resetPwdStrengthWrap" style="display:none">
              <div class="password-strength-track">
                <div class="password-strength-bar" id="resetPwdStrengthBar"></div>
              </div>
              <span class="password-strength-label" id="resetPwdStrengthLabel"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmNewPwd">Confirm New Password</label>
            <div class="form-input-wrap">
              <input type="password" id="confirmNewPwd" class="form-input has-icon"
                placeholder="Repeat new password"
                autocomplete="new-password" required/>
              <span class="input-icon" id="confirmNewPwdIcon" style="display:none">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" id="updatePwdBtn" data-loading-text="Updating...">
            Update Password
          </button>

        </form>
      </div>

      <!-- ═══ SUCCESS ═══ -->
      <div id="stepResetSuccess" style="display:none; text-align:center; padding:var(--space-6) 0;">
        <div style="font-size:2.5rem; margin-bottom:var(--space-4);">🔐</div>
        <h2 class="auth-title" style="color:var(--success); margin-bottom:var(--space-3);">Password Updated!</h2>
        <p class="auth-subtitle" style="margin-bottom:var(--space-6);">
          Your password has been changed successfully.
        </p>
        <a href="login.html" class="btn btn-gold">Sign In Now →</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="js/auth.core.js"></script>
  <script src="js/auth.redirect.js"></script>
  <script src="js/auth.session.js"></script>
  <script src="js/auth.reset.js"></script>
  <script>
    // ── Show saved email ──────────────────────────────────
    const resetEmail = getResetEmail();
    const displayEl  = document.getElementById('resetEmailDisplay');
    if (resetEmail) {
      displayEl.textContent = resetEmail;
    } else {
      displayEl.textContent = 'your email';
    }

    // ── OTP Inputs ─────────────────────────────────────────
    const otpInputs = document.querySelectorAll('#resetOTPContainer .otp-input');

    otpInputs.forEach((input, i) => {
      input.addEventListener('focus', () => {
        otpInputs.forEach(inp => inp.classList.remove('otp-error'));
        document.getElementById('resetOtpError').style.display = 'none';
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          if (!input.value && i > 0) { otpInputs[i - 1].focus(); otpInputs[i - 1].value = ''; otpInputs[i - 1].classList.remove('otp-filled'); }
          else input.classList.remove('otp-filled');
        }
        if (e.key === 'ArrowLeft'  && i > 0)                 { e.preventDefault(); otpInputs[i - 1].focus(); }
        if (e.key === 'ArrowRight' && i < otpInputs.length - 1) { e.preventDefault(); otpInputs[i + 1].focus(); }
      });

      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        input.value = val ? val.slice(-1) : '';
        if (input.value) {
          input.classList.add('otp-filled');
          if (i < otpInputs.length - 1) otpInputs[i + 1].focus();
        } else {
          input.classList.remove('otp-filled');
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        pasted.split('').forEach((char, idx) => {
          if (otpInputs[idx]) { otpInputs[idx].value = char; otpInputs[idx].classList.add('otp-filled'); }
        });
        otpInputs[Math.min(pasted.length, otpInputs.length - 1)].focus();
      });
    });

    if (otpInputs.length > 0) otpInputs[0].focus();

    // ── Verify recovery OTP ────────────────────────────────
    document.getElementById('verifyResetBtn').addEventListener('click', async () => {
      const btn   = document.getElementById('verifyResetBtn');
      const code  = Array.from(otpInputs).map(i => i.value).join('');
      const email = getResetEmail();

      if (code.length < 6) { Toast.warning('Enter the complete 6-digit code.'); return; }
      if (!email)          { Toast.error('Session expired. Please start over.'); setTimeout(() => window.location.href = 'forgot-password.html', 1500); return; }

      setButtonLoading(btn, true);
      const result = await handleVerifyRecoveryOTP(email, code);
      setButtonLoading(btn, false);

      if (result.error) {
        otpInputs.forEach(i => i.classList.add('otp-error'));
        const errEl = document.getElementById('resetOtpError');
        document.getElementById('resetOtpErrorText').textContent =
          result.error.message?.includes('expired') ? 'Code expired. Request a new one.' : 'Invalid code. Please try again.';
        errEl.style.display = 'flex';
        return;
      }

      Toast.success('Code verified!');
      // Advance to new password step
      document.getElementById('stepVerifyOTP').style.display = 'none';
      document.getElementById('stepNewPwd').style.display    = 'block';

      // Update step dots
      document.getElementById('otpStepDot').classList.remove('active');
      document.getElementById('otpStepDot').classList.add('done');
      document.getElementById('pwdStepDot').classList.add('active');
    });

    // ── Password strength ──────────────────────────────────
    document.getElementById('newPwd').addEventListener('input', (e) => {
      const val   = e.target.value;
      const wrap  = document.getElementById('resetPwdStrengthWrap');
      const bar   = document.getElementById('resetPwdStrengthBar');
      const label = document.getElementById('resetPwdStrengthLabel');
      wrap.style.display = val ? 'block' : 'none';
      updatePasswordStrengthBar(val, bar, label);
    });

    document.getElementById('confirmNewPwd').addEventListener('input', (e) => {
      const pwd   = document.getElementById('newPwd').value;
      const icon  = document.getElementById('confirmNewPwdIcon');
      icon.style.display = (e.target.value === pwd && e.target.value.length > 0) ? 'flex' : 'none';
    });

    document.getElementById('toggleNewPwd').addEventListener('click', () => {
      const input = document.getElementById('newPwd');
      input.type  = input.type === 'password' ? 'text' : 'password';
    });

    // ── Update password form ───────────────────────────────
    document.getElementById('newPwdForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAllErrors(e.target);

      const btn     = document.getElementById('updatePwdBtn');
      const newPwd  = document.getElementById('newPwd').value;
      const confirm = document.getElementById('confirmNewPwd').value;

      const result = await handleUpdatePassword(newPwd, confirm);

      if (result.error) {
        if (result.error.message.includes('match'))  showFieldError('confirmNewPwd', result.error.message);
        else if (result.error.message.includes('8')) showFieldError('newPwd', result.error.message);
        else Toast.error(result.error.message);
        return;
      }

      setButtonLoading(btn, true);
      Toast.success('Password updated successfully!');
      setTimeout(() => {
        document.getElementById('stepNewPwd').style.display       = 'none';
        document.getElementById('stepResetSuccess').style.display = 'block';
      }, 600);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>NavBus — Forgot Password</title>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/reset.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="auth-page">

  <div class="auth-orb-bottom"></div>

  <div class="auth-card">
    <div class="auth-card-inner">

      <!-- Logo -->
      <a href="../../index.html" class="auth-logo">
                <img src="../../assets/logo.png" alt="NavBus" class="auth-logo-img"/>
      </a>

      <!-- Back link -->
      <a href="login.html" class="auth-back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Sign In
      </a>

      <!-- ═══ STEP 1: Enter Email ═══ -->
      <div id="stepEmail">
        <div class="auth-header">
          <h1 class="auth-title">Reset Password</h1>
          <p class="auth-subtitle">Enter your registered email. We'll send you a reset code.</p>
        </div>

        <form class="auth-form" id="forgotForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="forgotEmail">Email Address</label>
            <div class="form-input-wrap">
              <input type="email" id="forgotEmail" class="form-input has-icon"
                placeholder="you@example.com"
                autocomplete="email" inputmode="email" required/>
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" id="sendResetBtn" data-loading-text="Sending code...">
            Send Reset Code
          </button>
        </form>

        <p class="auth-footer">Remembered it? <a href="login.html">Sign in</a></p>
      </div>

      <!-- ═══ STEP 2: Success sent ═══ -->
      <div id="stepSent" style="display:none; text-align:center;">
        <div style="font-size:2.5rem; margin-bottom:var(--space-5);">📧</div>
        <h2 class="auth-title" style="margin-bottom:var(--space-3);">Code Sent!</h2>
        <p class="auth-subtitle" style="margin-bottom:var(--space-6);">
          A reset code has been sent to<br/>
          <strong id="sentEmailDisplay" style="color:var(--gold);"></strong><br/>
          Check your inbox (and spam folder).
        </p>

        <a href="reset-password.html" class="btn btn-gold" id="goToResetBtn">
          Enter Reset Code →
        </a>

        <div class="otp-resend" style="margin-top:var(--space-5);">
          Didn't get it?
          <button id="resendForgotBtn" disabled>Resend</button>
          <span class="otp-countdown" id="forgotCountdown">in <span id="forgotSec">60</span>s</span>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="js/auth.core.js"></script>
  <script src="js/auth.redirect.js"></script>
  <script src="js/auth.session.js"></script>
  <script src="js/auth.reset.js"></script>
  <script>
    (async () => { await redirectIfAuthenticated(); })();

    let countdownInterval;

    function startForgotCountdown(seconds = 60) {
      const btn  = document.getElementById('resendForgotBtn');
      const tick = document.getElementById('forgotSec');
      const wrap = document.getElementById('forgotCountdown');
      let remaining = seconds;
      btn.disabled = true;
      wrap.style.display = 'inline';
      tick.textContent = remaining;
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        remaining--;
        tick.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          btn.disabled = false;
          wrap.style.display = 'none';
        }
      }, 1000);
    }

    // ── Submit forgot password ─────────────────────────────
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAllErrors(e.target);

      const btn   = document.getElementById('sendResetBtn');
      const email = document.getElementById('forgotEmail').value.trim();

      if (!validateEmail(email)) {
        showFieldError('forgotEmail', 'Enter a valid email address.');
        return;
      }

      setButtonLoading(btn, true);
      const result = await handleForgotPassword(email);
      setButtonLoading(btn, false);

      if (result.error) {
        // Don't reveal if email exists — show success anyway (security best practice)
        Toast.info('If this email is registered, a code has been sent.');
      } else {
        Toast.success('Reset code sent!');
      }

      // Always show sent screen (don't leak if email exists)
      document.getElementById('stepEmail').style.display = 'none';
      document.getElementById('stepSent').style.display  = 'block';
      document.getElementById('sentEmailDisplay').textContent = email;
      sessionStorage.setItem('navbus_reset_email', email);
      startForgotCountdown();
    });

    // ── Resend ─────────────────────────────────────────────
    document.getElementById('resendForgotBtn').addEventListener('click', async () => {
      const email = getResetEmail();
      if (!email) return;
      await handleForgotPassword(email);
      Toast.info('New reset code sent.');
      startForgotCountdown();
    });
  </script>
</body>
</html>

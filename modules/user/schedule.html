<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>NavBus — Schedule</title>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/reset.css"/>
  <link rel="stylesheet" href="css/user.layout.css"/>
  <style>
    .page-hero {
      padding: 28px 20px 20px;
    }
    .page-hero-title {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .page-hero-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .filter-row {
      padding: 0 20px 16px;
      display: flex; gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid var(--gold-border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip.active,
    .filter-chip:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold-border-2);
      color: var(--gold);
    }
    .bus-schedule-card {
      background: var(--bg-secondary);
      border: 1px solid var(--gold-border);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .bus-schedule-card:hover { border-color: var(--gold-border-2); }
    .bus-schedule-header {
      display: flex; align-items: center;
      padding: 14px 18px;
      gap: 12px;
      border-bottom: 1px solid rgba(201,168,76,0.07);
    }
    .bus-schedule-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(201,168,76,0.06);
      border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); flex-shrink: 0;
    }
    .bus-schedule-info { flex: 1; min-width: 0; }
    .bus-schedule-plate {
      font-family: var(--font-mono);
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .bus-schedule-route {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bus-status-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .bus-status-badge.online {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success);
    }
    .bus-status-badge.offline {
      background: rgba(110,99,84,0.1);
      border: 1px solid rgba(110,99,84,0.2);
      color: var(--text-muted);
    }
    .bus-status-badge.maintenance {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      color: var(--warning);
    }
    .bus-schedule-body {
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .schedule-detail {
      display: flex; flex-direction: column; gap: 3px;
    }
    .schedule-detail-label {
      font-size: 0.62rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: var(--font-display);
    }
    .schedule-detail-value {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .schedule-detail-value.highlight { color: var(--gold); }
    .live-indicator {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.68rem;
      color: var(--success);
    }
    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--success);
      animation: statusPulse 2s infinite;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state-title {
      font-family: var(--font-display);
      font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .empty-state-sub { font-size: 0.78rem; }
    .skeleton-card {
      background: var(--bg-secondary);
      border: 1px solid var(--gold-border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
    }
    .skeleton-block {
      background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-surface-2) 50%, var(--bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 12px;
      margin-bottom: 10px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .last-updated {
      text-align: center;
      font-size: 0.62rem;
      color: var(--text-disabled);
      padding: 8px 20px;
    }
  </style>
</head>
<body>
<div class="user-shell">

  <!-- HEADER -->
  <header class="user-header">
    <a href="home.html" class="user-header-logo">
      <svg width="30" height="18" viewBox="0 0 60 32" fill="none">
        <rect x="2" y="5" width="45" height="18" rx="3" stroke="#c9a84c" stroke-width="1.5"/>
        <rect x="47" y="9" width="10" height="11" rx="2" stroke="#c9a84c" stroke-width="1.5"/>
        <circle cx="11" cy="26" r="4" stroke="#c9a84c" stroke-width="1.5"/>
        <circle cx="35" cy="26" r="4" stroke="#c9a84c" stroke-width="1.5"/>
        <line x1="2" y1="13" x2="47" y2="13" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
      </svg>
      <div>
        <span class="user-header-logo-name">NAVBUS</span>
        <span class="user-header-logo-sub">Schedule</span>
      </div>
    </a>
    <div class="user-header-right">
      <a href="profile.html" class="user-avatar-btn" id="userAvatar">U</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="user-main">

    <div class="page-hero page-enter">
      <div class="page-hero-title">Fleet Schedule</div>
      <div class="page-hero-sub" id="scheduleCount">Loading fleet status…</div>
    </div>

    <!-- Filter chips -->
    <div class="filter-row">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="online">Online</button>
      <button class="filter-chip" data-filter="offline">Offline</button>
      <button class="filter-chip" data-filter="maintenance">Maintenance</button>
    </div>

    <!-- Schedule list -->
    <div class="user-section">
      <div id="scheduleList">
        <div class="skeleton-card">
          <div class="skeleton-block" style="width:40%"></div>
          <div class="skeleton-block" style="width:70%"></div>
          <div class="skeleton-block" style="width:55%"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-block" style="width:35%"></div>
          <div class="skeleton-block" style="width:80%"></div>
          <div class="skeleton-block" style="width:50%"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-block" style="width:45%"></div>
          <div class="skeleton-block" style="width:60%"></div>
          <div class="skeleton-block" style="width:65%"></div>
        </div>
      </div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>
    <div style="height:20px;"></div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="user-bottom-nav">
    <a href="home.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="nav-tab-label">Home</span>
    </a>
    <a href="routes.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
      </div>
      <span class="nav-tab-label">Routes</span>
    </a>
    <a href="schedule.html" class="nav-tab active">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="nav-tab-label">Schedule</span>
    </a>
    <a href="profile.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="nav-tab-label">Profile</span>
    </a>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="js/user.auth.guard.js"></script>
<script>
  let ALL_BUSES  = [];
  let activeFilter = 'all';

  document.addEventListener('DOMContentLoaded', async () => {
    await loadSchedule();

    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        const filtered = activeFilter === 'all'
          ? ALL_BUSES
          : ALL_BUSES.filter(b => b.status === activeFilter);
        renderSchedule(filtered);
      });
    });

    // Auto-refresh every 30 seconds
    setInterval(loadSchedule, 30000);
  });

  async function loadSchedule() {
    const { data, error } = await NAVBUS_DB
      .from('buses')
      .select(`
        id, number_plate, bus_name, bus_type, status, capacity, is_active,
        routes ( route_number, name, origin, destination ),
        drivers ( name, phone )
      `)
      .eq('is_active', true)
      .order('status');

    if (error || !data) {
      document.getElementById('scheduleList').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🚌</div>
          <div class="empty-state-title">No Buses Found</div>
          <div class="empty-state-sub">Fleet data will appear here once buses are registered.</div>
        </div>`;
      return;
    }

    ALL_BUSES = data;

    const online  = data.filter(b => b.status === 'online').length;
    const total   = data.length;
    document.getElementById('scheduleCount').textContent =
      `${online} of ${total} buses online`;

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `Last updated ${now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`;

    const filtered = activeFilter === 'all'
      ? ALL_BUSES
      : ALL_BUSES.filter(b => b.status === activeFilter);
    renderSchedule(filtered);
  }

  function renderSchedule(buses) {
    const el = document.getElementById('scheduleList');

    if (buses.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-title">No Buses</div>
          <div class="empty-state-sub">No buses match this filter.</div>
        </div>`;
      return;
    }

    el.innerHTML = buses.map(bus => {
      const route  = bus.routes  || null;
      const driver = bus.drivers || null;
      const status = bus.status  || 'offline';

      return `
        <div class="bus-schedule-card stagger-child">
          <div class="bus-schedule-header">
            <div class="bus-schedule-icon">
              <svg width="18" height="18" viewBox="0 0 60 32" fill="none">
                <rect x="2" y="5" width="45" height="18" rx="3" stroke="#c9a84c" stroke-width="2.5"/>
                <rect x="47" y="9" width="10" height="11" rx="2" stroke="#c9a84c" stroke-width="2.5"/>
                <circle cx="11" cy="26" r="4" stroke="#c9a84c" stroke-width="2.5"/>
                <circle cx="35" cy="26" r="4" stroke="#c9a84c" stroke-width="2.5"/>
              </svg>
            </div>
            <div class="bus-schedule-info">
              <div class="bus-schedule-plate">${escHtml(bus.number_plate)}</div>
              <div class="bus-schedule-route">
                ${route
                  ? `${escHtml(route.route_number)} — ${escHtml(route.name)}`
                  : 'No route assigned'
                }
              </div>
            </div>
            <span class="bus-status-badge ${status}">${status}</span>
          </div>
          <div class="bus-schedule-body">
            <div class="schedule-detail">
              <span class="schedule-detail-label">Driver</span>
              <span class="schedule-detail-value">
                ${driver ? escHtml(driver.name) : '—'}
              </span>
            </div>
            <div class="schedule-detail">
              <span class="schedule-detail-label">Type</span>
              <span class="schedule-detail-value">${escHtml(bus.bus_type) || '—'}</span>
            </div>
            <div class="schedule-detail">
              <span class="schedule-detail-label">Capacity</span>
              <span class="schedule-detail-value highlight">${bus.capacity} seats</span>
            </div>
            <div class="schedule-detail">
              <span class="schedule-detail-label">Route</span>
              <span class="schedule-detail-value">
                ${route
                  ? `${escHtml(route.origin)} → ${escHtml(route.destination)}`
                  : '—'
                }
              </span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    if (!str) return '—';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>NavBus — Find Your Bus</title>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/reset.css"/>
  <link rel="stylesheet" href="css/user.layout.css"/>
  <!-- Anti-flash: apply theme before first paint -->
  <script>
    (function(){
      var t = localStorage.getItem('navbus_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="css/user.home.css"/>
  <script src="../../js/theme.js"></script>
  <script src="js/user.theme.js"></script>
</head>
<body>

<div class="user-shell">

  <!-- ═══ HEADER ═══ -->
  <header class="user-header">
    <a href="home.html" class="user-header-logo">
      <img src="../../assets/logo.png" alt="NavBus" class="user-header-logo-img"/>
      <div>
        <span class="user-header-logo-name">NAVBUS</span>
        <span class="user-header-logo-sub">Smart Tracking</span>
      </div>
    </a>
    <div class="user-header-right">
      <!-- Fleet live dot -->
      <div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.18);">
        <div style="width:5px;height:5px;border-radius:50%;background:#4ade80;animation:statusPulse 2s infinite;"></div>
        <span style="font-family:var(--font-display);font-size:0.6rem;font-weight:700;letter-spacing:0.14em;color:#4ade80;">
          <span id="statOnlineBuses">0</span> LIVE
        </span>
      </div>
      <!-- Theme toggle -->
      <button id="headerThemeBtn" onclick="NavBusTheme.toggle(); updateHeaderThemeIcon()" title="Toggle theme" style="
        width:34px;height:34px;border-radius:50%;
        background:transparent;
        border:1px solid var(--gold-border);
        color:var(--text-muted);
        display:flex;align-items:center;justify-content:center;
        transition:all 0.18s;cursor:pointer;font-size:0.9rem;
      " onmouseenter="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'"
         onmouseleave="this.style.borderColor='var(--gold-border)';this.style.color='var(--text-muted)'">
        <span id="headerThemeIcon">🌙</span>
      </button>
            <a href="profile.html" class="user-avatar-btn" id="userAvatar">U</a>
    </div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main class="user-main">

    <!-- ── Hero + Search ── -->
    <div class="user-hero page-enter">
      <p class="hero-greeting" id="userGreeting">Good morning,</p>
      <h1 class="hero-name" id="userName">Passenger <span>👋</span></h1>

      <!-- Search Card -->
      <div class="search-card">
        <div class="search-card-title">Where are you going?</div>

        <div class="route-inputs">
          <!-- Connecting line -->
          <div class="route-line"></div>

          <!-- Origin -->
          <div class="route-input-wrap" style="position:relative;">
            <div class="route-input-dot origin"></div>
            <div style="flex:1;position:relative;">
              <input type="text" id="originInput" class="route-input"
                placeholder="From — Origin stop"
                autocomplete="off" spellcheck="false"/>
              <div class="autocomplete-dropdown" id="originDropdown"></div>
            </div>
          </div>

          <!-- Destination -->
          <div class="route-input-wrap" style="position:relative;">
            <div class="route-input-dot dest"></div>
            <div style="flex:1;position:relative;">
              <input type="text" id="destInput" class="route-input"
                placeholder="To — Destination stop"
                autocomplete="off" spellcheck="false"/>
              <div class="autocomplete-dropdown" id="destDropdown"></div>
            </div>
          </div>

          <!-- Swap -->
          <button class="swap-btn" id="swapBtn" title="Swap origin and destination">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
        </div>

        <button class="search-btn" id="searchBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Search Buses</span>
        </button>

        <!-- Recent searches -->
        <div style="margin-top:12px;">
          <div style="font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.22em;color:rgba(201,168,76,0.35);text-transform:uppercase;margin-bottom:8px;">Recent</div>
          <div id="recentSearches" class="recent-searches"></div>
        </div>
      </div>
    </div>

    <!-- ── Search Results (hidden until search) ── -->
    <div class="user-section" id="searchResultsSection" style="display:none;">
      <div class="section-heading" id="searchResultsHeader">
        <h3>Search Results</h3>
      </div>
      <div id="searchResultsContainer"></div>
    </div>

    <!-- ── Best Option ── -->
    <div class="user-section" id="bestOptionSection" style="display:none;">
      <!-- Populated by JS -->
    </div>

    <!-- ── Online Buses ── -->
    <div class="user-section">
      <div class="section-heading">
        <h3>Online Now</h3>
        <a href="#allBuses" class="section-see-all" onclick="document.getElementById('allBusesSection').scrollIntoView({behavior:'smooth'});return false;">See All →</a>
      </div>
      <div id="onlineBusesList">
        <!-- Skeleton + JS rendered -->
      </div>
    </div>

    <!-- ── All Routes ── -->
    <div class="user-section">
      <div class="section-heading">
        <h3>All Routes</h3>
      </div>
      <div id="allRoutesList">
        <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:0.8rem;">Loading routes…</div>
      </div>
    </div>

    <!-- ── All Buses ── -->
    <div class="user-section" id="allBusesSection">
      <div class="section-heading">
        <h3>All Fleet</h3>
        <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);"><span id="statTotalBuses">0</span> buses</span>
      </div>
      <div id="allBusesList">
        <!-- JS rendered -->
      </div>
    </div>

    <!-- Bottom padding -->
    <div style="height: 20px;"></div>
  </main>
 

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="user-bottom-nav">
    <a href="home.html" class="nav-tab active">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="nav-tab-label">Home</span>
    </a>
    <a href="routes.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
      </div>
      <span class="nav-tab-label">Routes</span>
    </a>
    <a href="map.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <span class="nav-tab-label">Map</span>
    </a>

    
    <a href="schedule.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="nav-tab-label">Schedule</span>
    </a>
    <a href="profile.html" class="nav-tab">
      <div class="nav-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="nav-tab-label">Profile</span>
    </a>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="js/user.auth.guard.js"></script>
<script src="js/user.home.js">
// ── Header theme icon sync ────────────────────────────────────
function updateHeaderThemeIcon() {
  const el = document.getElementById('headerThemeIcon');
  if (el) el.textContent = NavBusTheme.isDark() ? '🌙' : '☀️';
}
document.addEventListener('DOMContentLoaded', updateHeaderThemeIcon);
window.addEventListener('navbus:theme_change', updateHeaderThemeIcon);
</script>
</body>
</html>
